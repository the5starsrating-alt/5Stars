<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5tars — جاري المعالجة...</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #F0F4FF;
      color: #0B1F4E;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #EEF3FF;
      border-top-color: #2251D3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #64748B; }
    .status { font-size: 13px; color: #2251D3; margin-top: 16px; font-weight: 700; }
    .error-box { background: #FEF2F2; border: 1px solid rgba(220,38,38,0.2); color: #DC2626; border-radius: 10px; padding: 12px; margin-top: 16px; font-size: 13px; display: none; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <div class="title">جاري المعالجة...</div>
  <div class="sub">الرجاء الانتظار، يتم التحقق من بياناتك</div>
  <div class="status" id="statusMsg">جاري تسجيل الدخول...</div>
  <div class="error-box" id="errorBox"></div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://xdmbwtnpadjeinclmffh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkbWJ3dG5wYWRqZWluY2xtZmZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDI1OTksImV4cCI6MjA4ODQxODU5OX0.fmWmQXlm0eHnj8I5PFxakW7xh13nnMQBN1yU6-z2aFw'
);

async function handleCallback() {
  const statusMsg = document.getElementById('statusMsg');
  const errorBox = document.getElementById('errorBox');
  
  try {
    // Check URL params for Google OAuth state
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const stateParam = params.get('state');
    const code = params.get('code');
    
    // Handle Google Business Profile OAuth callback
    if (stateParam) {
      try {
        const state = JSON.parse(decodeURIComponent(stateParam));
        if (state.action === 'connect_gbp') {
          statusMsg.textContent = 'جاري ربط Google Business...';
          // Here you would exchange the code for tokens via your backend
          // For now, redirect back to dashboard
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 2000);
          return;
        }
      } catch(e) { /* ignore parse errors */ }
    }
    
    // Handle Supabase Auth callback (email confirmation, OAuth)
    statusMsg.textContent = 'جاري التحقق من الجلسة...';
    const { data: { session }, error } = await sb.auth.getSession();
    
    if (error) throw error;
    
    if (session) {
      statusMsg.textContent = 'تم تسجيل الدخول! جاري التحويل...';
      const isOwner = session.user.email === 'the5starsrating@gmail.com';
      setTimeout(() => {
        window.location.href = isOwner ? 'admin.html' : 'dashboard.html';
      }, 1000);
    } else {
      // Try to get session from URL hash (Supabase PKCE)
      const { data, error: authError } = await sb.auth.exchangeCodeForSession(code || '');
      if (authError) throw authError;
      
      if (data?.session) {
        statusMsg.textContent = 'تم! جاري التحويل...';
        const isOwner = data.session.user.email === 'the5starsrating@gmail.com';
        setTimeout(() => {
          window.location.href = isOwner ? 'admin.html' : 'dashboard.html';
        }, 1000);
      } else {
        statusMsg.textContent = 'لم يتم العثور على جلسة. جاري التحويل...';
        setTimeout(() => { window.location.href = 'signup.html'; }, 2000);
      }
    }
  } catch(err) {
    console.error('Callback error:', err);
    document.getElementById('spinner').style.display = 'none';
    errorBox.textContent = 'حدث خطأ: ' + (err.message || 'غير معروف');
    errorBox.style.display = 'block';
    statusMsg.textContent = 'فشل التحقق. سيتم تحويلك...';
    setTimeout(() => { window.location.href = 'signup.html'; }, 3000);
  }
}

handleCallback();
</script>
</body>
</html>
